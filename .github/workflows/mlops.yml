name: MLOps Pipeline

on:
  push:
    branches:
      - kernelridge

jobs:
  train-models:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Decision Tree Model
        run: |
          python train.py

      - name: Run Kernel Ridge Model
        run: |
          python train2.py